# Smart Camera Configuration
# Profile: default

[iot]
cert_path = /etc/smart-camera/certs/device.cert.pem
key_path = /etc/smart-camera/certs/device.private.key
root_ca_path = /etc/smart-camera/certs/AmazonRootCA1.pem
credential_endpoint = xxxxxxxxxxxx.credentials.iot.ap-northeast-1.amazonaws.com
role_alias = SmartCameraRole
thing_name = smart-camera-001

[video]
preset = Default
# Individual parameters can override preset values
width = 1280
height = 720
fps = 15
# bitrate_kbps = 2048
camera_source = v4l2_usb
camera_device_path = /dev/video8
# 备用 CSI 摄像头（IMX219）：camera_source = libcamera_csi, camera_device_path = /dev/video0

[kvs]
stream_name = smart-camera-001-stream
region = ap-northeast-1
retention_hours = 168
auto_create_stream = true

[webrtc]
channel_name = smart-camera-001-channel
region = ap-northeast-1
max_viewers = 10

[network]
bitrate_min_kbps = 256
bitrate_max_kbps = 4096
connection_check_interval_sec = 30
connection_timeout_ms = 5000

[logging]
level = INFO
file_path = /var/log/smart-camera/app.log
max_file_size_mb = 10
max_files = 5
log_to_stdout = true

[watchdog]
interval_sec = 10
error_threshold = 10
stale_timeout_sec = 60
memory_limit_mb = 512
cpu_quota_percent = 80

[frame_pool]
pool_size = 30

[ai]
model_timeout_sec = 5
# models = person_detector,bird_classifier

[ai_summary]
# FrameExporter 配置
export_fps = 2
shm_name = /smart_camera_frames
shm_size_mb = 20
socket_path = /run/smart-camera/ai.sock

# Activity Detector 配置
detect_classes = person,cat,dog,bird
confidence_threshold = 0.5
session_timeout_sec = 15
capture_dir = /var/lib/smart-camera/captures/
capture_max_files = 500
capture_max_size_mb = 200
disk_min_free_mb = 100

# Candidate buffer 配置
max_candidate_frames = 5
candidate_min_interval_ms = 500

# Event deduplication 配置
dedup_window_sec = 30

# S3 Uploader 配置
s3_bucket = smart-camera-captures
s3_prefix = captures
upload_retry_count = 5
upload_retry_interval_sec = 1

# DynamoDB 配置
dynamodb_table = smart-camera-events
event_ttl_days = 90
