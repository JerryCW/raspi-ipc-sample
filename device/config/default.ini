# Smart Camera Configuration
# Profile: default

[iot]
cert_path = /etc/smart-camera/certs/device.cert.pem
key_path = /etc/smart-camera/certs/device.private.key
root_ca_path = /etc/smart-camera/certs/AmazonRootCA1.pem
credential_endpoint = xxxxxxxxxxxx.credentials.iot.ap-northeast-1.amazonaws.com
role_alias = SmartCameraRole
thing_name = smart-camera-001

[video]
preset = Default
# Individual parameters can override preset values
# width = 1280
# height = 720
# fps = 15
# bitrate_kbps = 2048
camera_source = libcamera_csi
camera_device_path = /dev/video0

[kvs]
stream_name = smart-camera-001-stream
region = ap-northeast-1
retention_hours = 168
auto_create_stream = true

[webrtc]
channel_name = smart-camera-001-channel
region = ap-northeast-1
max_viewers = 10

[network]
bitrate_min_kbps = 256
bitrate_max_kbps = 4096
connection_check_interval_sec = 30
connection_timeout_ms = 5000

[logging]
level = INFO
file_path = /var/log/smart-camera/app.log
max_file_size_mb = 10
max_files = 5
log_to_stdout = true

[watchdog]
interval_sec = 10
error_threshold = 10
stale_timeout_sec = 60
memory_limit_mb = 512
cpu_quota_percent = 80

[frame_pool]
pool_size = 30

[ai]
model_timeout_sec = 5
# models = person_detector,bird_classifier
